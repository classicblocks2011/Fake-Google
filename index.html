<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Google</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:#202124;
  color:#e8eaed;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
.header{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  padding:10px 20px;
  gap:15px;
}

.header a{
  color:#e8eaed;
  text-decoration:none;
  font-size:13px;
}

.header a:hover{ text-decoration:underline; }

.header button{
  background:#8ab4f8;
  color:#202124;
  border:none;
  padding:8px 18px;
  border-radius:4px;
  cursor:pointer;
  font-weight:500;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* LOGO */
.logo{
  font-size:82px;
  font-weight:500;
  margin-bottom:30px;
  letter-spacing:-2px;
}

.logo span:nth-child(1){color:#4285f4;}
.logo span:nth-child(2){color:#ea4335;}
.logo span:nth-child(3){color:#fbbc05;}
.logo span:nth-child(4){color:#4285f4;}
.logo span:nth-child(5){color:#34a853;}
.logo span:nth-child(6){color:#ea4335;}

/* SEARCH */
.search-box{
  background:#fff;
  padding:10px 15px;
  border-radius:24px;
  width:580px;
  display:flex;
  align-items:center;
  box-shadow:0 1px 6px rgba(32,33,36,.28);
  transition:0.2s;
}

.search-box:hover{
  box-shadow:0 1px 8px rgba(32,33,36,.4);
}

.search-box input{
  flex:1;
  border:none;
  outline:none;
  font-size:16px;
}

/* BUTTONS */
.buttons{ margin-top:25px; }

.buttons button{
  background:#303134;
  border:1px solid #303134;
  color:#e8eaed;
  padding:8px 16px;
  margin:5px;
  border-radius:4px;
  cursor:pointer;
}

.buttons button:hover{
  border:1px solid #5f6368;
}

/* FOOTER */
.footer{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  font-size:14px;
  color:#9aa0a6;
}

/* OVERLAY */
#overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  color:#00ff00;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:monospace;
}
</style>
</head>

<body>

<div class="header">
  <a href="#">Gmail</a>
  <a href="#">Imágenes</a>
  <button>Acceder</button>
</div>

<div class="main">
  <div class="logo">
    <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
  </div>

  <div class="search-box">
    <input id="searchQuery" placeholder="Busca en Google o escribe una URL">
  </div>

  <div class="buttons">
    <button onclick="search()">Buscar</button>
    <button onclick="lucky()">Me siento con suerte</button>
  </div>
</div>

<div class="footer">
  <span>España</span>
  <span>Privacidad · Términos · Configuración</span>
</div>

<div id="overlay"></div>

<script>

/* STATE */
let current = 0
const TOTAL = 80

/* TRANSFORM */
function transform(input, seed){
  let out=""
  for(let i=0;i<input.length;i++){
    let c=input.charCodeAt(i)
    c=c^(seed%255)
    out+=String.fromCharCode(c)
  }
  return btoa(out)
}

/* CAPAS ORIGINALES */
const layers = [
"the void","what is real","mirror","reverse","binary","decode","hidden","signal","observe","noise",
"hello world","time","echo","key","lock","cipher","caesar","shift","code","base",
"math","prime","fibonacci","sequence","pattern","circle","ratio","modulo","zero","one",
"left","right","up","down","center","origin","axis","grid","map","point",
"alpha","beta","gamma","delta","omega","lambda","sigma","theta","phi","zeta",
"fire","water","earth","air","void2","signal2","noise2","echo2","loop","break",
"one","two","three","four","five","six","seven","eight","nine","ten",
"truth","false","yes","no","maybe","unknown","hidden2","core","seed","final",
"3301"
]

/* SEARCH */
function search(){
  const q=document.getElementById("searchQuery").value.trim().toLowerCase()

  if(q==="3301"){
    start()
    return
  }

  window.location.href="https://google.com/search?q="+encodeURIComponent(q)
}

function lucky(){
  alert("No hay suerte esta vez...")
}

/* START */
function start(){
  document.getElementById("overlay").style.display="flex"
  render()
}

/* HINTS (ORIGINAL) */
function hint(i){
  if(i<10) return "look at meaning"
  if(i<20) return "language shifts reality"
  if(i<30) return "math structures truth"
  if(i<40) return "direction matters"
  if(i<50) return "symbols encode logic"
  if(i<60) return "elements repeat"
  if(i<70) return "binary thinking"
  return "final convergence"
}

/* RENDER */
function render(){
  document.getElementById("overlay").innerHTML=`
    <h2>Layer ${current+1}/${TOTAL}</h2>
    <p>${hint(current)}</p>
    <input id="ans">
    <button onclick="check()">OK</button>
  `
}

/* CHECK */
function check(){
  const input=document.getElementById("ans").value.trim().toLowerCase()
  const expected=layers[current]

  if(current<10){
    if(input===expected){
      next()
    } else glitch()
    return
  }

  const seed=current+1
  const t1=transform(input,seed)
  const t2=transform(expected,seed)

  if(t1===t2){
    next()
  } else glitch()
}

/* NEXT */
function next(){
  current++
  if(current>=TOTAL){
    win()
  } else render()
}

/* GLITCH */
function glitch(){
  document.getElementById("overlay").innerHTML=`
    <h2>SIGNAL ERROR</h2>
    <p>retrying...</p>
  `
  setTimeout(render,700)
}

/* WIN */
function win(){
  document.getElementById("overlay").innerHTML=`
    <h1>ACCESS GRANTED</h1>
    <p>3301 CONFIRMED</p>
  `
}

</script>

</body>
  </html>
