<script>

/* =========================
   🔐 SHA256 CORE
========================= */

async function sha256(text){
  const buf = await crypto.subtle.digest(
    "SHA-256",
    new TextEncoder().encode(text)
  )
  return [...new Uint8Array(buf)]
    .map(b=>b.toString(16).padStart(2,"0"))
    .join("")
}

/* =========================

   (NO TEXTO LEGIBLE)
========================= */

]

/* =========================
   🔐 HASH PRECALCULADO
========================= */

const layers = []

async function initLayers(){
  for(let i=0;i<rawLayers.length;i++){
    layers[i] = await sha256(rawLayers[i] + "-seed-" + i)
  }
}

/* =========================
   🧠 ARG STATE
========================= */

let current = 0
const TOTAL = 80

/* =========================
   UI SEARCH
========================= */

function search(){
  const q=document.getElementById("searchQuery").value.trim().toLowerCase()

  if(q==="3301"){
    start()
    return
  }

  window.location.href="https://google.com/search?q="+encodeURIComponent(q)
}

function lucky(){
  alert("No hay suerte esta vez...")
}

/* =========================
   🚪 START
========================= */

function start(){
  document.getElementById("overlay").style.display="flex"
  render()
}

/* =========================
   🧩 HINTS (NO RESPUESTAS)
========================= */

function hint(i){
  const h=[
    "binary echo",
    "reverse perception",
    "time distortion",
    "hidden structure",
    "noise contains signal",
    "coordinates matter",
    "nothing is random",
    "look deeper"
  ]
  return h[i % h.length]
}

/* =========================
   📺 RENDER
========================= */

function render(){
  document.getElementById("overlay").innerHTML=`
    <h2>Layer ${current+1}/${TOTAL}</h2>
    <p>${hint(current)}</p>
    <input id="ans">
    <button onclick="check()">OK</button>
  `
}

/* =========================
   🔐 CHECK
========================= */

async function check(){
  const input=document.getElementById("ans").value.trim()

  const h=await sha256(input + "-seed-" + current)

  if(h===layers[current]){
    current++

    if(current>=TOTAL){
      win()
    }else{
      render()
    }

  }else{
    glitch()
  }
}

/* =========================
   💥 GLITCH
========================= */

function glitch(){
  document.getElementById("overlay").innerHTML=`
    <h2>SIGNAL ERROR</h2>
    <p>recalculating...</p>
  `
  setTimeout(render,900)
}

/* =========================
   🏁 WIN
========================= */

function win(){
  document.getElementById("overlay").innerHTML=`
    <h1>ACCESS GRANTED</h1>
    <p>3301</p>
  `
}

initLayers()
