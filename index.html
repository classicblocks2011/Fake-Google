<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#202124;color:#e8eaed;}

.main{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.logo{font-size:72px;margin-bottom:30px;}
.logo span:nth-child(1){color:#4285f4;}
.logo span:nth-child(2){color:#ea4335;}
.logo span:nth-child(3){color:#fbbc05;}
.logo span:nth-child(4){color:#4285f4;}
.logo span:nth-child(5){color:#34a853;}
.logo span:nth-child(6){color:#ea4335;}

.search-box{background:#fff;border-radius:24px;padding:10px;width:500px;}
.search-box input{width:100%;border:none;outline:none;}

.buttons{margin-top:20px;}
.buttons button{padding:8px 12px;}

.game{
background:black;
color:#00ff00;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:monospace;
text-align:center;
}
</style>
</head>

<body>

<div class="main">
<div class="logo">
<span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
</div>

<form onsubmit="return search(event)">
<div class="search-box">
<input type="text" id="searchQuery" placeholder="Busca en Google">
</div>

<div class="buttons">
<button type="submit">Buscar</button>
</div>
</form>
</div>

<script>
let currentLayer = 0

const layers = [

['7468655f766f6964','the_void'],
['d2hhdF9pc19yZWFs','what_is_real'],
['laer_si_siht','this_is_real'],
['wklv_lv_qrw_uhdo','this_is_not_real'],
['hidden_truth','hidden_truth'],
['deeper_than_code','deeper_than_code'],
['51.5074, 0.1278','london'],
['2,4,8,16,?','32'],

['SGVsbG8=','hello'],
['01101000 01101001','hi'],
['68 65 6c 6c 6f','hello'],
['uryyb','hello'],
['khoor','hello'],

['3,9,27,81,?','243'],
['1,1,2,3,5,8,?','13'],
['√144','12'],
['2^5 + 2^3','40'],

['Base64: Z29vZA==','good'],
['ROT13: frperg','secret'],
['unicode 0041','a'],

['binary of 10','1010'],
['hex of 255','ff'],
['prime after 50','53'],

['reverse+base64: ZG9vZw==','wood'],
['(3^4)','81'],
['sum 1-10','55'],

['coordinates: 40.7128,-74.0060','new york'],
['capital of france','paris'],

['the key is in console','deeper_than_code'],
['read console','deeper_than_code'],

['(12*12)','144'],
['sqrt(256)','16'],

['final key','3301']

]

function search(e){
  if(e) e.preventDefault()

  let q = document.getElementById('searchQuery').value.trim().toLowerCase()

  if(q === '3301'){
    startGame()
    return false
  }

  if(q === 'guguel'){
    window.location.href = "https://guguel.com"
    return false
  }

  if(q !== ''){
    window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(q)
  }

  return false
}

function startGame(){
  currentLayer = 0
  showLayer()
}

function showLayer(){
  document.body.innerHTML = `
  <div class="game">
    <h2>Layer ${currentLayer + 1}</h2>
    <p>${layers[currentLayer][0]}</p>
    <input id="answer" autofocus>
    <button onclick="checkAnswer()">OK</button>
  </div>`
}

function checkAnswer(){
  let input = document.getElementById('answer').value.trim().toLowerCase()

  if(input === layers[currentLayer][1]){
    currentLayer++

    if(currentLayer >= layers.length){
      showFinal()
    } else {
      showLayer()
    }

  } else {
    alert('Incorrecto')
  }
}

function showFinal(){
  document.body.innerHTML = `
  <div class="game" style="color:red">
    <h1>YOU MADE IT</h1>
    <p>THE SYSTEM WAS WATCHING YOU</p>
  </div>`
}

console.log('deeper_than_code')
console.log('nothing is random')
</script>

</body>
</html>
