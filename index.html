<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Google</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: #202124;
  color: #e8eaed;
}

/* HEADER */
.header {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding: 10px 20px;
  gap: 15px;
}

.header a {
  color: #e8eaed;
  text-decoration: none;
  font-size: 13px;
}

.header button {
  background: #8ab4f8;
  color: #202124;
  border: none;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.logo {
  font-size: 72px;
  font-weight: 500;
  margin-bottom: 30px;
}

.logo span:nth-child(1){color:#4285f4;}
.logo span:nth-child(2){color:#ea4335;}
.logo span:nth-child(3){color:#fbbc05;}
.logo span:nth-child(4){color:#4285f4;}
.logo span:nth-child(5){color:#34a853;}
.logo span:nth-child(6){color:#ea4335;}

.search-box {
  background: #fff;
  padding: 10px;
  border-radius: 24px;
  width: 500px;
  display: flex;
}

.search-box input {
  flex: 1;
  border: none;
  outline: none;
}

/* BUTTONS */
.buttons {
  margin-top: 20px;
}

.buttons button {
  margin: 5px;
  padding: 8px 12px;
}

/* OVERLAY */
#overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:#00ff00;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family: monospace;
}
</style>
</head>

<body>

<div class="header">
  <a href="#">Gmail</a>
  <a href="#">Imágenes</a>
  <button>Acceder</button>
</div>

<div class="main">
  <div class="logo">
    <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
  </div>

  <div class="search-box">
    <input id="searchQuery" placeholder="Busca en Google o escribe una URL">
  </div>

  <div class="buttons">
    <button onclick="search()">Buscar</button>
    <button onclick="lucky()">Me siento con suerte</button>
  </div>
</div>

<div id="overlay"></div>

<script>

/* =========================
   🧠 STATE
========================= */

let current = 0
const TOTAL = 80

/* =========================
   🔐 HASH
========================= */

async function sha256(text){
  const buf = await crypto.subtle.digest(
    "SHA-256",
    new TextEncoder().encode(text)
  )
  return [...new Uint8Array(buf)]
    .map(b=>b.toString(16).padStart(2,"0"))
    .join("")
}

/* =========================
   💀 80 CAPAS REALES
========================= */

const layers = [
"the void","what is real","mirror","reverse","binary","decode","hidden","signal","observe","noise",
"hello world","time","echo","key","lock","cipher","caesar","shift","code","base",
"math","prime","fibonacci","sequence","pattern","circle","ratio","modulo","zero","one",
"left","right","up","down","center","origin","axis","grid","map","point",
"alpha","beta","gamma","delta","omega","lambda","sigma","theta","phi","zeta",
"fire","water","earth","air","void2","signal2","noise2","echo2","loop","break",
"one","two","three","four","five","six","seven","eight","nine","ten",
"truth","false","yes","no","maybe","unknown","hidden2","core","seed","final",
"3301"
]

/* =========================
   🔎 SEARCH
========================= */

function search(){
  const q=document.getElementById("searchQuery").value.trim().toLowerCase()

  if(q==="3301"){
    start()
    return
  }

  window.location.href="https://google.com/search?q="+encodeURIComponent(q)
}

function lucky(){
  alert("No hay suerte esta vez...")
}

/* =========================
   🚪 START
========================= */

function start(){
  document.getElementById("overlay").style.display="flex"
  render()
}

/* =========================
   🧩 HINTS
========================= */

function hint(i){
  if(i<10) return "look at meaning"
  if(i<20) return "language shifts reality"
  if(i<30) return "math structures truth"
  if(i<40) return "direction matters"
  if(i<50) return "symbols encode logic"
  if(i<60) return "elements repeat"
  if(i<70) return "binary thinking"
  return "final convergence"
}

/* =========================
   📺 RENDER
========================= */

function render(){
  document.getElementById("overlay").innerHTML=`
    <h2>Layer ${current+1}/${TOTAL}</h2>
    <p>${hint(current)}</p>
    <input id="ans">
    <button onclick="check()">OK</button>
  `
}

/* =========================
   🔐 CHECK
========================= */

async function check(){
  const input=document.getElementById("ans").value.trim().toLowerCase()

  const expected=layers[current]

  const h1=await sha256(input)
  const h2=await sha256(expected)

  if(h1===h2){
    current++
    if(current>=TOTAL){
      win()
    } else {
      render()
    }
  } else {
    glitch()
  }
}

/* =========================
   💥 GLITCH
========================= */

function glitch(){
  document.getElementById("overlay").innerHTML=`
    <h2>SIGNAL ERROR</h2>
    <p>retrying...</p>
  `
  setTimeout(render,700)
}

/* =========================
   🏁 WIN
========================= */

function win(){
  document.getElementById("overlay").innerHTML=`
    <h1>ACCESS GRANTED</h1>
    <p>3301 CONFIRMED</p>
  `
}

</script>

</body>
</html>
