// transformación única por capa
function transform(input, seed){
  input = input.toLowerCase().trim()

  let out = ""
  for(let i=0;i<input.length;i++){
    let c = input.charCodeAt(i)
    c = c + ((i+1)*seed % 7) - (seed % 3)
    out += String.fromCharCode(c)
  }

  return btoa(out.split('').reverse().join(''))
}

// validación
function check(input, target, seed){
  return transform(input,seed) === target
}
