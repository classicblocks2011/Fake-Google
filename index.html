<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Google</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: #202124;
  color: #e8eaed;
}

/* HEADER */
.header {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding: 10px 20px;
  gap: 15px;
}

.header a {
  color: #e8eaed;
  text-decoration: none;
  font-size: 13px;
}

.header button {
  background: #8ab4f8;
  color: #202124;
  border: none;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.logo {
  font-size: 72px;
  font-weight: 500;
  margin-bottom: 30px;
}

.logo span:nth-child(1){color:#4285f4;}
.logo span:nth-child(2){color:#ea4335;}
.logo span:nth-child(3){color:#fbbc05;}
.logo span:nth-child(4){color:#4285f4;}
.logo span:nth-child(5){color:#34a853;}
.logo span:nth-child(6){color:#ea4335;}

.search-box {
  background: #fff;
  padding: 10px;
  border-radius: 24px;
  width: 500px;
  display: flex;
}

.search-box input {
  flex: 1;
  border: none;
  outline: none;
}

/* BUTTONS */
.buttons {
  margin-top: 20px;
}

.buttons button {
  margin: 5px;
  padding: 8px 12px;
}

/* OVERLAY */
#overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:#00ff00;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family: monospace;
}
</style>
</head>

<body>

<div class="header">
  <a href="#">Gmail</a>
  <a href="#">Imágenes</a>
  <button>Acceder</button>
</div>

<div class="main">
  <div class="logo">
    <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
  </div>

  <div class="search-box">
    <input id="searchQuery" placeholder="Busca en Google o escribe una URL">
  </div>

  <div class="buttons">
    <button onclick="search()">Buscar</button>
    <button onclick="lucky()">Me siento con suerte</button>
  </div>
</div>

<div id="overlay"></div>

<script>

/* =========================
   STATE
========================= */

let current = 0
const TOTAL = 80

/* =========================
   TRANSFORM (simple y natural)
========================= */

function transform(input, seed){
  input = input.toLowerCase().trim()

  let out = ""
  for(let i=0;i<input.length;i++){
    let c = input.charCodeAt(i)
    c = c + (seed % 5) - 2
    out += String.fromCharCode(c)
  }

  return btoa(out)
}

/* =========================
   CAPAS
========================= */

// PRIMERAS 10 (tus originales)
const baseLayers = [
"the void","what is real","this is not real","hidden truth","deeper layer",
"london signal","binary start","time loop","no escape","observe system"
]

// RESTO CIFRADAS (ocultas)
const encryptedLayers = [
"QkM=","Q0Q=","Q0U=","Q0Y=","Q0c=","Q0g=","Q0k=","Q0o=","Q0s=","Q0w=",
"Q00=","Q04=","Q08=","Q1A=","Q1E=","Q1I=","Q1M=","Q1Q=","Q1U=","Q1Y=",
"Q1c=","Q1g=","Q1k=","Q1o=","Q1s=","Q1w=","Q2A=","Q2E=","Q2I=","Q2M=",
"Q2Q=","Q2U=","Q2Y=","Q2c=","Q2g=","Q2k=","Q2o=","Q2s=","Q2w=","Q3A=",
"Q3E=","Q3I=","Q3M=","Q3Q=","Q3U=","Q3Y=","Q3c=","Q3g=","Q3k=","Q3o=",
"Q3s=","Q3w=","Q4A=","Q4E=","Q4I=","Q4M=","Q4Q=","Q4U=","Q4Y=","Q4c=",
"Q4g=","Q4k=","Q4o=","Q4s=","Q4w=","Q5A=","Q5E=","Q5I=","Q5M=","Q5Q="
]

/* =========================
   HINTS (natural)
========================= */

function hint(i){
  if(i<10) return baseLayers[i]
  if(i<20) return "same idea"
  if(i<30) return "change it a bit"
  if(i<40) return "something shifts"
  if(i<50) return "look again"
  if(i<60) return "pattern repeats"
  if(i<70) return "almost there"
  return "final step"
}

/* =========================
   SEARCH
========================= */

function search(){
  let q=document.getElementById("searchQuery").value.trim().toLowerCase()

  if(q==="3301"){
    start()
    return
  }

  window.location.href="https://google.com/search?q="+encodeURIComponent(q)
}

function lucky(){
  alert("No hay suerte esta vez...")
}

/* =========================
   START
========================= */

function start(){
  document.getElementById("overlay").style.display="flex"
  render()
}

/* =========================
   RENDER
========================= */

function render(){
  document.getElementById("overlay").innerHTML=`
    <h2>Layer ${current+1}/80</h2>
    <p>${hint(current)}</p>
    <input id="ans">
    <button onclick="check()">OK</button>
  `
}

/* =========================
   CHECK
========================= */

function check(){
  let input=document.getElementById("ans").value.trim().toLowerCase()

  if(current < 10){
    if(input === baseLayers[current]){
      current++
      render()
    } else glitch()
    return
  }

  let seed = current+1
  let t = transform(input, seed)

  if(t === encryptedLayers[current-10]){
    current++
    if(current>=TOTAL) win()
    else render()
  } else glitch()
}

/* =========================
   GLITCH
========================= */

function glitch(){
  document.getElementById("overlay").innerHTML=`
    <h2>incorrect</h2>
  `
  setTimeout(render,700)
}

/* =========================
   WIN
========================= */

function win(){
  document.getElementById("overlay").innerHTML=`
    <h1>ACCESS GRANTED</h1>
    <p>3301</p>
  `
}

</script>

</body>
</html>
