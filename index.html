<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;background:#202124;color:#e8eaed;}
.main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.logo{font-size:72px;margin-bottom:30px;}
.logo span:nth-child(1){color:#4285f4;}
.logo span:nth-child(2){color:#ea4335;}
.logo span:nth-child(3){color:#fbbc05;}
.logo span:nth-child(4){color:#4285f4;}
.logo span:nth-child(5){color:#34a853;}
.logo span:nth-child(6){color:#ea4335;}
.search-box{background:#fff;border-radius:24px;padding:10px;width:500px;}
.search-box input{width:100%;border:none;outline:none;}
.buttons{margin-top:20px;}
.buttons button{margin:5px;padding:8px 12px;}
#layers{display:none;}
.secret{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;font-family:monospace;background:black;color:#00ff00;}
</style>
</head>
<body>

<div class="main">
<div class="logo">
<span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
</div>

<form onsubmit="return search(event)">
<div class="search-box">
<input type="text" id="searchQuery" placeholder="Busca en Google">
</div>

<div class="buttons">
<button type="submit">Buscar</button>
</div>
</form>
</div>

<div id="layers"></div>

<script>
function search(e){
  if(e) e.preventDefault()

  let q = document.getElementById('searchQuery').value.trim().toLowerCase()

  // 🔐 3301
  if(q === '3301'){
    showSecret("INICIANDO PROTOCOLO 3301...")
    return false
  }

  // 🧩 CICADA
  if(q === 'cicada'){
    showSecret("LA CLAVE NO ESTÁ EN LA SUPERFICIE")
    return false
  }

  // 🌑 DEEP WEB
  if(q === 'deep web'){
    showSecret("HAS IDO DEMASIADO PROFUNDO")
    return false
  }

  // 🕶 TOR
  if(q === 'tor browser'){
    showSecret("OCULTARTE NO TE SALVARÁ")
    return false
  }

  // 😂 GUGUEL
  if(q === 'guguel'){
    window.location.href = "https://guguel.com"
    return false
  }

  // 🌐 GOOGLE REAL
  if(q !== ''){
    window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(q)
  }

  return false
}

// función para mostrar secretos
function showSecret(text){
  document.querySelector('.main').style.display='none'
  document.body.innerHTML = `
    <div class="secret">
      <h1>${text}</h1>
      <p style="margin-top:20px;">...observando...</p>
    </div>
  `
}
</script>

</body>
</html>
