<!doctype html>
<html lang="es">
<head>

<title>Google</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: #202124;
  color: #e8eaed;
}

/* HEADER */
.header {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding: 10px 20px;
  gap: 15px;
}

.header a {
  color: #e8eaed;
  text-decoration: none;
  font-size: 13px;
}

.header a:hover {
  text-decoration: underline;
}

.header button {
  background: #8ab4f8;
  color: #202124;
  border: none;
  padding: 8px 16px;
  border-radius: 4px;
  font-size: 13px;
  cursor: pointer;
}

.header button:hover {
  background: #aecbfa;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.logo {
  font-size: 72px;
  font-weight: 500;
  margin-bottom: 30px;
  letter-spacing: -2px;
}

.logo span:nth-child(1){color:#4285f4;}
.logo span:nth-child(2){color:#ea4335;}
.logo span:nth-child(3){color:#fbbc05;}
.logo span:nth-child(4){color:#4285f4;}
.logo span:nth-child(5){color:#34a853;}
.logo span:nth-child(6){color:#ea4335;}

.search-box {
  display: flex;
  align-items: center;
  background: #fff;
  border-radius: 24px;
  padding: 8px 16px;
  width: 100%;
  max-width: 584px;
}

.search-box input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 16px;
  color: #202124;
}

/* BUTTONS */
.buttons {
  margin-top: 26px;
  display: flex;
  gap: 12px;
}

.buttons button {
  background: #303134;
  color: #e8eaed;
  border: 1px solid #303134;
  padding: 10px 16px;
  border-radius: 4px;
  font-size: 14px;
  cursor: pointer;
}

.buttons button:hover {
  border-color: #5f6368;
}

/* FOOTER */
.footer {
  display: flex;
  justify-content: space-between;
  padding: 10px 20px;
  font-size: 13px;
  color: #9aa0a6;
}

.footer a {
  color: #9aa0a6;
  text-decoration: none;
  margin-right: 15px;
}

.footer a:hover {
  text-decoration: underline;
}

/* OVERLAY */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: #00ff00;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: monospace;
  z-index: 9999;
}
</style>
</head>

/* =========================
   🔐 MOTOR ARG 3301
========================= */

function transform(input, seed){
  input = input.toLowerCase().trim()

  let out = ""
  for(let i=0;i<input.length;i++){
    let c = input.charCodeAt(i)
    c = c + ((i+1)*seed % 7) - (seed % 3)
    out += String.fromCharCode(c)
  }

  return btoa(out.split('').reverse().join(''))
}

function search(){
  let q=document.getElementById("searchQuery").value.trim().toLowerCase()

  }

/* =========================
   💀 ARG SYSTEM
========================= */

function start(){
  document.getElementById("overlay").style.display="flex"
  show()
}

function show(){
  document.getElementById("overlay").innerHTML=`
    <h2>Layer ${current+1}/80</h2>
    <p>${layers[current][0]}</p>
    <input id="ans">
    <button onclick="check()">OK</button>
  `
}

function check(){
  let input=document.getElementById("ans").value
  let seed=current+1
  let target=transform(layers[current][0],seed)

  if(transform(input,seed)===target){
    current++
    if(current>=layers.length){
      win()
    } else {
      show()
    }
  } else alert("incorrect")
}

function win(){
