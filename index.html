<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Google</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:Arial;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:#202124;
  color:#e8eaed;
}
.header{display:flex;justify-content:flex-end;padding:10px;}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.logo{font-size:72px;margin-bottom:30px;}
.search-box{background:#fff;padding:10px;border-radius:24px;width:500px;display:flex;}
.search-box input{flex:1;border:none;outline:none;}
.buttons{margin-top:20px;}
#overlay{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:black;color:#00ff00;
  display:none;flex-direction:column;
  justify-content:center;align-items:center;
  font-family:monospace;
}
</style>
</head>

<body>

<div class="header">
  <button>Acceder</button>
</div>

<div class="main">
  <div class="logo">Google</div>

  <div class="search-box">
    <input id="searchQuery" placeholder="Busca...">
  </div>

  <div class="buttons">
    <button onclick="search()">Buscar</button>
  </div>
</div>

<div id="overlay"></div>

<script>

/* =========================
   🧠 STATE
========================= */
let current=0
const TOTAL=80

/* =========================
   🔐 TRANSFORM
========================= */
function transform(input,seed){
  let out=""
  for(let i=0;i<input.length;i++){
    let c=input.charCodeAt(i)
    c = c ^ (seed*7 % 255)
    out+=String.fromCharCode(c)
  }
  return btoa(out)
}

/* =========================
   💀 CAPAS
========================= */

// primeras 10 (visibles tipo ARG clásico)
const baseLayers=[
"the void","what is real","mirror","reverse","binary",
"decode","hidden","signal","observe","noise"
]

// resto cifradas
const encryptedLayers=[
"U1dY","Qk1O","VE9P","Q0hB","Rk9P","RkZB","RkZE","RkZF","RkZH","RkZI",
"RkZJ","RkZK","RkZL","RkZN","RkZO","RkZP","RkZR","RkZS","RkZT","RkZU",
"RkZV","RkZW","RkZX","RkZY","RkZZ","RkZa","QUFB","QUFC","QUFD","QUFE",
"QUFF","QUFG","QUFH","QUFI","QUFJ","QUFK","QUFL","QUFM","QUFN","QUFO",
"QUFP","QUFR","QUFS","QUFT","QUFU","QUFV","QUFW","QUFX","QUFY","QUFZ",
"QUFa","QkFB","QkFC","QkFD","QkFE","QkFF","QkFG","QkFH","QkFI","QkFJ",
"QkFK","QkFL","QkFM","QkFN","QkFO","QkFP","QkFR","QkFS","QkFT","QkFU"
]

/* =========================
   🔎 SEARCH
========================= */
function search(){
  let q=document.getElementById("searchQuery").value.trim().toLowerCase()
  if(q==="3301"){
    start()
  }
}

/* =========================
   🚪 START
========================= */
function start(){
  document.getElementById("overlay").style.display="flex"
  render()
}

/* =========================
   🧩 HINTS
========================= */
function hint(i){
  if(i<10) return "understand the concept"
  if(i<20) return "encode the input"
  if(i<30) return "pattern transformation"
  if(i<40) return "bitwise logic"
  if(i<50) return "nothing is plain"
  if(i<60) return "repeat patterns"
  if(i<70) return "layer is the key"
  return "final signal"
}

/* =========================
   📺 RENDER
========================= */
function render(){
  document.getElementById("overlay").innerHTML=`
    <h2>Layer ${current+1}/80</h2>
    <p>${hint(current)}</p>
    <input id="ans">
    <button onclick="check()">OK</button>
  `
}

/* =========================
   🔐 CHECK
========================= */
function check(){
  let input=document.getElementById("ans").value.trim().toLowerCase()

  // primeras 10
  if(current<10){
    if(input===baseLayers[current]){
      current++
      render()
    }else glitch()
    return
  }

  // resto cifrado
  let seed=current+1
  let t=transform(input,seed)

  if(t===encryptedLayers[current-10]){
    current++
    if(current>=TOTAL) win()
    else render()
  }else glitch()
}

/* =========================
   💥 GLITCH
========================= */
function glitch(){
  document.getElementById("overlay").innerHTML=`
    <h2>SIGNAL ERROR</h2>
  `
  setTimeout(render,700)
}

/* =========================
   🏁 WIN
========================= */
function win(){
  document.getElementById("overlay").innerHTML=`
    <h1>ACCESS GRANTED</h1>
    <p>3301</p>
  `
}

</script>

</body>
</html>
